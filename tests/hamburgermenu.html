<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="examples">
      <button
        class="button-one"
        aria-controls="mobile-navigation"
        aria-expanded="false"
      >
        <svg
          class="line hamburger"
          viewBox="0 0 100 100"
          width="250"
          fill="currentColor"
        >
          <rect
            class="line top"
            width="80"
            height="10"
            x="10"
            y="25"
            rx="5"
          ></rect>
          <rect
            class="line middle"
            width="80"
            height="10"
            x="10"
            y="45"
            rx="5"
          ></rect>
          <rect
            class="line bottom"
            width="80"
            height="10"
            x="10"
            y="65"
            rx="5"
          ></rect>
        </svg>
      </button>
      <button class="button-two"></button>
      <button class="button-three"></button>
    </div>
  </body>
  <style>
    svg {
      color: inherit;
    }
    button {
      background: transparent;
      border-radius: 1rem;
      border: 5px solid;
    }

    .button-one .line {
      transition:
        y 300ms ease-in 300ms,
        rotate 300ms ease-in,
        opacity 0ms 300ms;
      transform-origin: center;
    }

    .button-one:hover .line {
      transition:
        y 50ms ease-in,
        rotate 100ms ease-out 100ms,
        opacity 0ms 100ms;
    }

    .button-one:hover :is(.top, .bottom) {
      y: 45;
    }

    .button-one:hover .top {
      rotate: 45deg;
    }
    .button-one:hover .bottom {
      rotate: -45deg;
    }
    .button-one:hover .middle {
      opacity: 0;
    }
    /* 
    .button-one[aria-expanded="true"] .top {
    } 
    Keep watching from 19:05 
    https://www.youtube.com/watch?v=R00QiudbD4Y&list=PLNmAdCuVk6DwN6cWD-unDLFMhaArqJjX9&index=1
    */
  </style>
</html>
